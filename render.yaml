services:
  - type: web
    name: guardian-trading-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: pnpm install && pnpm --filter @workspace/api-server run build
    startCommand: pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: ADMIN_JWT_SECRET
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://guardian-trading.vercel.app,https://guardian-clone-admin-kyc.vercel.app
