kind = "web"
  previewPath = "/admin-kyc/"
  title = "Guardian Admin — KYC Dashboard"
  version = "1.0.0"
  id = "artifacts/admin-kyc"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/admin-kyc/" ]
  localPort = 8080

  [services.development]
  run = "pnpm run dev:admin"

  [services.production]
  build = [ "pnpm", "run", "build:admin" ]
  publicDir = "dist/admin-kyc"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"

  [services.env]
  PORT = "8080"
  BASE_PATH = "/admin-kyc/"
  