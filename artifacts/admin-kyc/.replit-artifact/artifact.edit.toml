kind = "web"
previewPath = "/admin-kyc/"
title = "Admin KYC"
version = "1.0.0"

[[services]]
localPort = 3002
name = "Admin KYC"
paths = ["/admin-kyc/"]

[services.env]
PORT = "3002"
API_PORT = "3001"
BASE_PATH = "/admin-kyc/"

[services.development]
run = "API_PORT=3001 pnpm --filter @workspace/admin-kyc run dev"

[services.production]
build = "pnpm --filter @workspace/admin-kyc run build"
serve = "static"
