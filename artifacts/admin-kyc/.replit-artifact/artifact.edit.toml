kind = "api"
title = "Guardian Admin — KYC Dashboard (Internal)"
version = "1.0.0"
id = "artifacts/admin-kyc"

[[services]]
localPort = 8080
name = "web"
paths = ["/admin-kyc/"]

[services.env]
PORT = "8080"
BASE_PATH = "/admin-kyc/"
API_PORT = "3001"

[services.development]
run = "pnpm --filter @workspace/admin-kyc run dev"

[services.production]
build = ["pnpm", "--filter", "@workspace/admin-kyc", "run", "build"]
publicDir = "artifacts/admin-kyc/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
