kind = "web"
previewPath = "/"
title = "Guardian Trading"
version = "1.0.0"

[[services]]
localPort = 3000
name = "Guardian Trading"
paths = ["/"]

[services.env]
PORT = "3000"
API_PORT = "3001"

[services.development]
run = "API_PORT=3001 pnpm --filter @workspace/guardian-trading run dev"

[services.production]
build = "pnpm --filter @workspace/guardian-trading run build"
serve = "static"
