kind = "web"
  previewPath = "/"
  title = "Guardian Trading"
  version = "1.0.0"
  id = "artifacts/guardian-trading"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  localPort = 3000
  name = "web"
  paths = ["/"]

  [services.development]
  run = "pnpm run dev:client"

  [services.env]
  PORT = "3000"
  BASE_PATH = "/"

  [services.production]
  build = ["pnpm", "run", "build:client"]
  publicDir = "dist"
  serve = "static"

  [[services.production.rewrites]]
  from = "/*"
  to = "/index.html"
  